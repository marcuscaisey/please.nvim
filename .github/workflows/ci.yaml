name: CI
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test-and-typecheck-lua-code:
    name: Test and Typecheck Lua Code
    uses: ./.github/workflows/test-and-typecheck-lua-code.yaml

  check-neovim-toolchain-versions:
    name: Check Neovim Toolchain Versions
    uses: ./.github/workflows/check-neovim-toolchain-versions.yaml

  lint-lua-code:
    name: Lint Lua Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
      - name: Run Stylua
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check --color always .

  lint-build-files:
    name: Lint BUILD Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit
        uses: actions/checkout@v6
      - name: Run BUILD file format check
        run: |
          ./pleasew format --write
          if ! git diff --quiet; then
              echo 'The following files need to be formatted with "plz format --write"':
              git --no-pager diff --name-only
              exit 1
          fi
